# Health OS — локальный self-hosted стек
# Все данные хранятся в named volumes — переживают restart/down/up.
# Запуск:    docker compose up -d
# Остановка: docker compose down           (данные сохраняются)
# Снести всё: docker compose down -v       (УДАЛИТ ВСЕ ДАННЫЕ)

name: health-os

services:

  # ── PostgreSQL 16 с pgvector ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: health-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthos}
      POSTGRES_USER: ${POSTGRES_USER:-healthos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthos} -d ${POSTGRES_DB:-healthos}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO (S3 для PDF/фото анализов) ──────────────────────────
  minio:
    image: minio/minio:latest
    container_name: health-os-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-healthos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_local}
    volumes:
      - miniodata:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"      # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Web UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket bootstrap (создаёт bucket "health-files" один раз)
  minio-init:
    image: minio/mc:latest
    container_name: health-os-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-healthos} ${MINIO_ROOT_PASSWORD:-changeme_local};
      mc mb -p local/health-files || true;
      mc anonymous set download local/health-files || true;
      exit 0;
      "
    restart: "no"

  # ── HAPI FHIR JPA Server (R4) ─────────────────────────────────
  fhir:
    image: hapiproject/hapi:latest
    container_name: health-os-fhir
    restart: unless-stopped
    environment:
      spring.datasource.url: jdbc:postgresql://postgres:5432/${FHIR_DB:-fhir}
      spring.datasource.username: ${POSTGRES_USER:-healthos}
      spring.datasource.password: ${POSTGRES_PASSWORD:-changeme_local}
      spring.datasource.driverClassName: org.postgresql.Driver
      spring.jpa.properties.hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgres94Dialect
      hapi.fhir.fhir_version: R4
      hapi.fhir.openapi_enabled: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${FHIR_PORT:-8080}:8080"

  # ── Backend API (FastAPI) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health-os-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-healthos}:${POSTGRES_PASSWORD:-changeme_local}@postgres:5432/${POSTGRES_DB:-healthos}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-healthos}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme_local}
      MINIO_BUCKET: health-files
      MINIO_SECURE: "false"
      FHIR_BASE_URL: http://fhir:8080/fhir
      OLLAMA_URL: http://ollama:11434
      TZ: Europe/Simferopol
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Web UI ────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: health-os-web
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
      TZ: Europe/Simferopol
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./web:/app:ro

  # ── Ollama (опционально, профиль ai) ──────────────────────────
  # Запуск с LLM:  docker compose --profile ai up -d
  ollama:
    image: ollama/ollama:latest
    container_name: health-os-ollama
    restart: unless-stopped
    profiles: ["ai"]
    volumes:
      - ollamadata:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

volumes:
  pgdata:
    name: health_os_pgdata
  miniodata:
    name: health_os_miniodata
  ollamadata:
    name: health_os_ollamadata
